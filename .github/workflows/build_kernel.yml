name: Kernel Build

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang llvm \
            bc flex bison \
            libssl-dev libelf-dev \
            libncurses-dev \
            ccache git zip
      
      - name: Hunt OPLUS symbols like a bloodhound
        run: |
          echo "🔍 Scanning for OPLUS_FEATURE_PERFORMANCE_MM references..."
    
          # Where is it defined?
          echo "=== DEFINITIONS ==="
          grep -rn "config OPLUS_FEATURE_PERFORMANCE_MM" --include="Kconfig" . || echo "Not found in Kconfig"
    
          # Where is it set to 'y'?
          echo -e "\n=== WHERE IT'S SET TO 'y' ==="
          grep -rn "OPLUS_FEATURE_PERFORMANCE_MM=y" --include="*.config" --include="defconfig" --include="*_defconfig" . || echo "Not force-enabled in defconfigs"
    
          # Where is it used in C code?
          echo -e "\n=== CODE REFERENCES ==="
          grep -rn "OPLUS_FEATURE_PERFORMANCE_MM" --include="*.c" --include="*.h" . | head -20 || echo "No code references found"
    
          # What depends on it?
          echo -e "\n=== DEPENDENCIES ==="
          grep -rn "depends on OPLUS_FEATURE_PERFORMANCE_MM" --include="Kconfig" . || echo "No dependencies found"

      - name: Setup clang
        run: |
          git clone --depth=1 https://gitlab.com/Jprimero15/lolz_clang.git -b main clang

      - name: Build kernel
        run: |
          export PATH="$PWD/clang/bin:$PATH"
          make O=out ARCH=arm64 defconfig
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            LLVM=1 LLVM_IAS=1

      - name: Upload Image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-image
          path: out/arch/arm64/boot/*